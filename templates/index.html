{% extends "base.html" %}

{% block content %}
<section class="hero-index" style="text-align: center; margin-bottom: 5rem; padding: 4rem 0; border-bottom: 1px solid var(--border);">
    <h1 style="font-size: 2.8rem; margin-bottom: 1rem; color: var(--primary);">{{ site.name }}</h1>
    <p style="font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto;">{{ site.description }}</p>
</section>

<div class="article-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 3rem;">
    {% for article in all_articles %}
    <article class="card article-entry" style="display: flex; flex-direction: column;">
        <a href="{{ article.url }}" style="display: block; overflow: hidden; aspect-ratio: 16/9;">
            <img src="{{ article.conf.eye_catch }}" alt="{{ article.conf.title }}" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </a>
        <div style="padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column;">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
                <span style="background: var(--secondary); color: #fff; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 700;">{{ article.category.name }}</span>
                <span style="font-size: 0.8rem; color: var(--text-muted);">{{ today }}</span>
            </div>
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem; line-height: 1.4;">
                <a href="{{ article.url }}" style="color: var(--secondary); text-decoration: none;">{{ article.conf.title }}</a>
            </h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; flex-grow: 1;">
                {{ article.conf.meta_description[:80] }}...
            </p>
            <a href="{{ article.url }}" style="font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; color: var(--primary);">
                記事を読む
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg>
            </a>
        </div>
    </article>
    {% endfor %}
</div>

<style>
    @media (max-width: 768px) {
        .hero-index { padding: 2rem 0; margin-bottom: 3rem; }
        .hero-index h1 { font-size: 2rem; }
        .article-grid { grid-template-columns: 1fr; gap: 2rem; }
    }
</style>
{% endblock %}
