<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}">
    <link rel="canonical" href="{{ canonical_url }}">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site_name }}">

    <style>
        :root {
            --primary-color: #cc0000; /* 楽天レッド */
            --bg-color: #f8f8f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --muted-color: #666666;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--primary-color);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, #cc0000, #ff4d4d);
            color: white;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card a {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            background: #fff;
        }

        .card-body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1rem;
            font-weight: bold;
            margin: 0 0 0.5rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price {
            font-size: 1.25rem;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .review {
            font-size: 0.85rem;
            color: #ffa500;
            margin-bottom: 1rem;
        }

        .btn {
            display: block;
            text-align: center;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem;
            border-radius: 4px;
            font-weight: bold;
            margin-top: auto;
        }

        footer {
            background: #ffffff;
            border-top: 1px solid #ddd;
            padding: 2rem 1rem;
            margin-top: 4rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted-color);
        }

        .updated-at {
            margin-top: 1rem;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.75rem;
            }
            .product-name { font-size: 0.9rem; }
            .price { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/" class="logo">{{ site_name }}</a>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 {{ site_name }} - 全ての商品情報は楽天市場より取得しています。</p>
        <p>※当サイトはアフィリエイト広告を利用しています。</p>
        <div class="updated-at">最終更新: {{ updated_at }}</div>
    </footer>
</body>
</html>
