# 楽天アフィリエイト「専門メディア型」自動生成サイト v4.0
# config/articles.yaml

site:
  name: "美活ガジェット比較【2026年最新】"
  description: "3万円以上の美容家電で後悔しないための検証メディア。編集部による実機テストと徹底的なデメリット公開で、あなたの失敗しない買い物をサポートします。"
  base_url: "https://yoshio-fujimoto.github.io/antigravity-site/"

categories:
  - id: "beauty-appliances"
    name: "美容家電"
    slug: "beauty"
    description: "高機能ドライヤー、ヘアアイロンなどの高級美容家電を徹底比較。"

articles:
  # =================== 記事1: ドライヤー ===================
  - id: "hair-dryer-ranking"
    category_id: "beauty-appliances"
    slug: "dryer-ranking"
    enabled: true

    # 記事レベルのメタデータ
    h1: "ヘアドライヤー おすすめ10選"
    title: "【2026年最新】ヘアドライヤー おすすめ10選｜3万円以上の失敗しない選び方"
    meta_description: "ヘアドライヤーの高級モデルを徹底比較。速乾性・ヘアケア性能・重さを編集部が独自検証。ナノケア、リファなど人気機種のメリット・デメリットを公開。"
    
    # 検証項目（比較表用）
    test_criteria:
      - id: "dry_speed"
        name: "速乾性"
      - id: "hair_care"
        name: "ヘアケア"
      - id: "weight"
        name: "軽さ"

    intro: |
      「高いドライヤーを買ったのに乾きが遅い」「重くて手が疲れる」...そんな後悔をしていませんか？
      本記事では、3万円以上の高級ドライヤーを中心に、楽天市場で人気の10機種を編集部が独自検証。
      スペック表には載らない「本当の使い心地」と、あえて「デメリット」も包み隠さずお伝えします。

    selection_criteria:
      - title: "速乾性だけじゃない「風の質」"
        body: "単なる風量の数値よりも、髪をいたわりながら乾かすイオン機能や温度制御が重要です。ダメージを抑えることが、結果的に翌朝のスタイリング時間を短縮します。"
      - title: "500gの壁「持ちやすさ」"
        body: "毎日5〜10分持つものだからこそ、重量バランスが大切。500g以下なら疲れにくく、ロングヘアの方でもストレスなく乾かせます。"

    # 商品固有の付加価値データ (APIデータと結合)
    # ※APIから取得する順位(1-10位)に合わせてデータを定義
    products_extra:
      - rank: 1
        reason: "速乾性とヘアケアのバランスが最も優れており、誰にでもおすすめできる一台。"
        pros: ["驚異的な速乾スピード", "髪のツヤが目に見えて変わる", "温冷自動切り替えが優秀"]
        cons: ["本体価格が高め", "サイズがやや大きく収納を選ぶ"]
        best_for: "仕上がり重視・時短したい全世代"
      - rank: 2
        reason: "圧倒的な軽さと、サロン帰りのような質感を自宅で再現できる。"
        pros: ["とにかく軽い（400g以下）", "デザインが非常にオシャレ", "頭皮ケアモードが心地よい"]
        cons: ["風の広がりが狭い", "ボタン操作に慣れが必要"]
        best_for: "手が疲れやすい方・デザイン重視派"
      - rank: 3
        reason: "コスパ最強。1万円台で高級機に匹敵する大風量を実現。"
        pros: ["この価格帯で最大級の風量", "シンプルで使いやすい操作系", "カラーバリエーションが豊富"]
        cons: ["作動音がやや大きい", "イオン機能が上位機種より控えめ"]
        best_for: "予算を抑えつつ速乾性を求める方"

    rakuten_params:
      keyword: "ドライヤー 速乾 ナノケア リファ"
      sort: "-reviewCount"
      hits: 10
      min_review_count: 50

    related_article_ids:
      - "hair-iron-ranking"

  # =================== 記事2: ヘアアイロン ===================
  - id: "hair-iron-ranking"
    category_id: "beauty-appliances"
    slug: "iron-ranking"
    enabled: true

    h1: "ヘアアイロン おすすめ10選"
    title: "【2026年最新】ヘアアイロン おすすめ10選｜髪が痛まない最強モデルを比較"
    meta_description: "ヘアアイロンの高級モデルを比較。髪の水分を守るプレート技術や使い勝手を検証。ストレート・カール兼用の人気機種をランキング形式で紹介。"
    
    test_criteria:
      - id: "smoothness"
        name: "滑りの良さ"
      - id: "damage_less"
        name: "低ダメージ"
      - id: "heating_time"
        name: "立ち上がり"

    intro: |
      「アイロンを使うたびに髪がパサつく」...それはプレートの素材や温度管理が原因かもしれません。
      本記事では、髪の水分バランスを整え、使うほどにツヤが出ると評判の高級ヘアアイロンを厳選。
      プロ仕様から初心者向けまで、実際の「滑りやすさ」と「髪の痛み具合」を徹底比較しました。

    selection_criteria:
      - title: "プレートの「クッション性」"
        body: "髪を挟んだ時の沈み込みがあるモデルは、過度な圧力を防ぎ、枝毛や断毛のリスクを減らします。"
      - title: "温度の「復元力」"
        body: "髪を通すとプレートの温度は下がります。瞬時に設定温度に戻るパワーがあるモデルなら、何度も通す必要がなく、ダメージを最小限に抑えられます。"

    products_extra:
      - rank: 1
        reason: "独自のカーボンレイヤープレートが、水・熱・圧のダメージを劇的に抑える。"
        pros: ["髪が濡れていても爆発しない", "非常に軽量で操作しやすい", "しっとりした仕上がり"]
        cons: ["価格が4万円超えと非常に高い", "コードが細く断線に注意"]
        best_for: "髪のダメージが深刻な方・艶髪を目指す方"
      - rank: 2
        reason: "驚異的な滑りの良さで、スタイリング時間が半分になる。"
        pros: ["一度通すだけで真っ直ぐ", "滑りが極めてスムーズ", "温度の立ち上がりが速い"]
        cons: ["本体がやや熱くなりやすい", "液晶が見にくい"]
        best_for: "朝の時間を短縮したい・癖が強い方"

    rakuten_params:
      keyword: "ヘアアイロン 痛まない リファ ヤーマン"
      sort: "-reviewCount"
      hits: 10
      min_review_count: 50

    related_article_ids:
      - "hair-dryer-ranking"
