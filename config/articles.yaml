      critical_cons: 専用ソフトの機能が多すぎて、最初は少し設定項目に戸惑うかもしれません。
      maintenance_reality: マグネット式のマウントが強力で、モニターの上にしっかりと固定できます。
      cost_performance: 一眼レフカメラをWebカメラ化する面倒なセッティング（数万円〜十数万円）を、これ1台で疑似体験できる神コスパ機です。
    - keyword: ロジクール
      best_for: ジンバルなどの物理的な動きは不要だが、広角で部屋全体を綺麗に映したいビジネスマン
      scores:
        image_sensor: 4.0
        ai_tracking: 3.5
        presentation: 4.5
      analysis_why: ロジクールの定番ビジネスハイエンド。ジンバルはありませんが、右に向ける「ショーモード」にすると自動で手元（書類やスケッチ）の映像を反転させて真っ直ぐ映してくれる機能が超有能です。
      pros:
        - 手元の書類を見せる「ショーモード」が非常に実用的
        - ライトコレクション機能で顔が明るく綺麗に映る
        - 物理的なプライバシーシャッター付きで安心
      critical_cons: 4K対応ではなくフルHD（1080p）です。会議用途としては十分すぎますが、録画用途では上位機に劣ります。
      maintenance_reality: ジンバルのような可動部がないため、故障リスクが低くガンガン使えます。
      cost_performance: ロジクールの高いソフトウェア安定性と保証期間を含め、「仕事の道具」としての信頼性は随一です。
    - keyword: Elgato
      best_for: ゲーム実況やYouTube配信で、映像の圧縮（遅延）を極限まで無くしたいストリーマー
      scores:
        image_sensor: 4.5
        ai_tracking: 2.0
        presentation: 3.5
      analysis_why: 配信機材のトップブランドElgatoの自信作。「非圧縮の1080p60fps映像」をそのままPCに送るため、動きの速いゲーム配信でも自分の顔が残像にならず、究極にクリアです。
      pros:
        - 映像を圧縮しないため、遅延ゼロ・画質劣化ゼロ
        - SONY製STARVISセンサーによる圧倒的な明るさ
        - カメラ内に設定を保存でき、別のPCに繋いでも同じ画質
      critical_cons: マイクが内蔵されていません。配信者は別でマイクを持っているという前提の「映像全振り」仕様です。
      maintenance_reality: 巨大なヒートシンクを内蔵しており、長時間の配信でも熱暴走を防ぐプロ仕様の耐久性です。
      cost_performance: 映像の遅延やブロックノイズが許されない、ストリーマー（配信者）にとってはこれ一択となる特化型機です。

