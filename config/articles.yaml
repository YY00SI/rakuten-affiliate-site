      care: 5.0
      usability: 4.8
    analysis_why: MTGのReFa BEAUTECHシリーズは、プロの美容師が行う「温度コントロール」を内蔵センサーで自動再現します。楽天市場のレビューでも「不器用でもツヤが出る」「しっとり感が段違い」という声が圧倒的でした。
