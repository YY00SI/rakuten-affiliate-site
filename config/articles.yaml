  products_extra:
    - keyword: さくら製作所
      best_for: ワインだけでなく、四合瓶や一升瓶の日本酒を「0℃」で氷温保存したい日本酒・ワイン両刀の方
      scores:
        cooling_power: 5.0
        temperature_range: 5.0
        design: 4.5
      analysis_why: 日本の住宅事情と気候を知り尽くした国産ブランド。ZERO CLASSシリーズは「0℃〜22℃」という脅威の温度設定が可能で、日本酒の生酒（要冷蔵）を完璧な状態で保存できます。
      pros:
        - 0℃設定が可能で日本酒の氷温熟成ができる
        - 上下2層で違う温度を設定できる（赤ワインと白・日本酒）
        - 猛暑でもビクともしない強力なコンプレッサー
      critical_cons: ガラス扉にヒーター（結露防止）が内蔵されているため、他メーカーより若干電気代がかかります。
      maintenance_reality: 霜取り機能が優秀で、庫内の掃除は数ヶ月に1回サッと拭く程度で済みます。
      cost_performance: 数千円〜数万円のワインや日本酒を「ダメにするリスク」をゼロにできるため、お酒好きにとっては数年で元が取れる冷蔵庫です。
    - keyword: Dometic
      best_for: リビングルームの中心に置いても恥ずかしくない、欧州の洗練されたデザインを求める方
      scores:
        cooling_power: 4.5
        temperature_range: 3.5
        design: 5.0
      analysis_why: スウェーデン発祥の世界的冷却機器メーカー。洗練されたガラスドアと木製棚の組み合わせが圧倒的に美しく、高級レストランに置かれているようなオーラを放ちます。
      pros:
        - 北欧デザインのミニマルで圧倒的な高級感
        - ワインを優しく守るUVカットガラスと庫内LED
        - 静音設計に優れたコンプレッサー
      critical_cons: 欧州基準の設計のため、日本酒の一升瓶などを縦置きするのには向いていません（ワイン専用と割り切るのが吉）。
      maintenance_reality: 木製棚にワインを寝かせておくため、ボトルの結露に気をつければ長期間美しさを保てます。
      cost_performance: インテリアとしての価値が非常に高く、「ワインを楽しむ空間」そのものを格上げする投資です。
    - keyword: deviceSTYLE
      best_for: キッチンの隙間や、一人暮らしの狭い部屋に本格的なセラーを導入したい方
      scores:
        cooling_power: 4.5
        temperature_range: 4.0
        design: 4.5
      analysis_why: 日本の家電ブランド。スリムな縦型デザインに定評があり、幅を極限まで切り詰めたモデル（幅40cm未満）でも本格的なコンプレッサー式を採用しています。
      pros:
        - 狭い隙間にもスッポリ収まるスリムデザイン
        - コンプレッサー式でありながら比較的安価
        - ペアガラスによる高い断熱性
      critical_cons: スリム化の代償として、太いブルゴーニュボトルやシャンパンボトルは収納本数が少し減る場合があります。
      maintenance_reality: フィルター掃除などの手間が少なく、初めてのワインセラーとしても扱いやすいです。
      cost_performance: ペルチェ式（安価だが夏に冷えない）の予算にもう少し足すだけで「本物のコンプレッサー機」が買える、絶妙な価格設定です。
    - keyword: ルフィエール
      best_for: 初めてワインセラーを買うので、まずは「安くてちゃんと冷えるコンプレッサー機」を試したい方
      scores:
        cooling_power: 4.5
        temperature_range: 3.5
        design: 4.0
      analysis_why: ワイン専門ショップ直営ブランド。コンプレッサー式でありながら信じられないほどの低価格（3万円台〜）を実現しており、楽天で長年ランキング1位を獲得し続ける「大衆の王」です。
      pros:
        - コンプレッサー式としては市場最安級の価格破壊
        - シンプルで無駄のない機能とデザイン
        - シャンパンボトルも入りやすい棚ピッチ
      critical_cons: 上下で別々の温度を設定する機能（2温度管理）は上位機種にしかついていません。
      maintenance_reality: 安価ですが作りはしっかりしており、購入者のレビューでも長期間稼働している報告が多いです。
      cost_performance: 「ペルチェ式を買って後悔する」という初心者の失敗を、この低価格で完全に防いでくれるコスパ最強のエントリー機です。


