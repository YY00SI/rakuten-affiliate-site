    <style>
        :root {
            --rakuten-red: #BF0000;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --bg-color: #f8f8f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --muted-color: #666666;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background-color: #ffffff;
            border-bottom: 3px solid var(--rakuten-red);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--rakuten-red);
            text-decoration: none;
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        /* 記事用スタイル */
        .updated-at {
            color: var(--muted-color);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .toc {
            background: #f9f9f9;
            border: 1px solid #eee;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .toc ul {
            list-style: none;
            padding-left: 1rem;
        }

        h1 { font-size: 1.8rem; border-bottom: 2px solid var(--rakuten-red); padding-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; border-left: 5px solid var(--rakuten-red); padding-left: 1rem; margin-top: 2.5rem; }

        /* 商品カード（ランキング形式） */
        .product-card {
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            position: relative;
        }

        @media (max-width: 600px) {
            .product-card { flex-direction: column; }
        }

        .rank-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .rank-1 { background-color: var(--gold); }
        .rank-2 { background-color: var(--silver); }
        .rank-3 { background-color: var(--bronze); }
        .rank-other { background-color: #666; }

        .product-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .product-image { width: 100%; height: auto; }
        }

        .card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .price-area {
            font-size: 1.4rem;
            color: var(--rakuten-red);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .review-area {
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .stars { color: #ffa500; font-weight: bold; }
        .review-count { color: var(--muted-color); margin-left: 5px; }

        .btn-cta {
            background-color: var(--rakuten-red);
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: block;
            margin-top: auto;
            transition: background 0.2s;
        }

        .btn-cta:hover {
            background-color: #a00000;
        }

        /* 関連記事・カテゴリ一覧 */
        .article-list {
            list-style: none;
            padding: 0;
        }

        .article-list li {
            margin-bottom: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .article-list a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .article-list a:hover {
            color: var(--rakuten-red);
        }

        footer {
            background: #ffffff;
            border-top: 1px solid #ddd;
            padding: 3rem 1rem;
            margin-top: 4rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted-color);
        }
    </style>
